spring:
  application:
    name: backend

  datasource:
    url: jdbc:mysql://localhost:3306/playstory?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: playstory_app
    password: qwer1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

    show-sql: true

  sql:
    init:
      schema-locations: classpath:db/schema.sql
      mode: always