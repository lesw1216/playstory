server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # prod: /api 요청을 backend 컨테이너로 리버스 프록시(same-origin → CORS 불필요)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA: 정적 파일이 없으면 index.html로 폴백 (Vue Router history 모드)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
