services:
  mysql:
    image: mysql:8.0
    container_name: playstory-mysql
    command:
      # client-handshake=FALSE: init 클라이언트가 보낸 charset을 무시하고 utf8mb4 강제
      # → 시드의 한글이 글자수 초과로 오인되는 Data too long 방지
      - --character-set-client-handshake=FALSE
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: playstory
      MYSQL_USER: playstory_app
      MYSQL_PASSWORD: qwer1234
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      # 최초 기동 시 스키마(01)·시드 10만건(02)을 자동 실행
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      # 시드 주입이 끝나 실서버가 떠야 ping 성공 → backend가 안전하게 대기
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - playstory-net

  backend:
    build: ./backend
    container_name: playstory-backend
    environment:
      # 호스트는 서비스 이름 mysql(컨테이너명·-1 접미사와 무관하게 네트워크에서 resolve)
      DB_URL: "jdbc:mysql://mysql:3306/playstory?serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
      EXCEL_OUTPUT_DIR: /app/data/excel
    ports:
      - "8080:8080"
    volumes:
      - excel-data:/app/data/excel
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
    networks:
      - playstory-net

  frontend:
    build: ./frontend
    container_name: playstory-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - playstory-net

networks:
  playstory-net:
    driver: bridge

volumes:
  mysql-data:
  excel-data:
